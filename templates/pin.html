<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso rápido</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/pin.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/FreshStepsLogo.png') }}">
</head>

<body>

<div class="pin-container">
    <h2>Acceso</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="alert {{ category }}">
{{ msg }}
        </div>
      {% endfor %}
    {% endwith %}   

    <form method="POST" class="pin-form">

        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="pin-input-wrap">
            <input
                type="password"
                name="pin"
                id="pinInput"
                maxlength="4"
                inputmode="numeric"
                pattern="[0-9]{4}"
                placeholder="••••"
                class="pin-input"
                required
            >
            <span id="togglePin" class="pin-toggle">
                <svg id="iconoOjoPin" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </span>
        </div>

        <button type="submit" class="pin-btn">Entrar</button>
    </form>

    <a href="{{ url_for('auth.login', admin=1) }}" class="admin-secret">
        <i data-lucide="settings" width="16" height="16"></i>
    </a>

</div>

<script src="{{ url_for('static', filename='js/pages/password-toggle.js') }}"></script>
</body>
</html>
